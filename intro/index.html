<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">

  <title>Max Zimmer — Deep Learning, Optimization, AI</title>
  <meta name="description" content="Max Zimmer — Deep Learning Research Lead at Zuse Institute Berlin, PhD Candidate in Mathematics at TU Berlin.">

  <!-- Open Graph -->
  <meta property="og:title" content="Max Zimmer — Deep Learning, Optimization, AI">
  <meta property="og:description" content="Deep Learning Research Lead at Zuse Institute Berlin. PhD Candidate in Mathematics at TU Berlin.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://maxzimmer.org/intro/">
  <meta property="og:image" content="https://maxzimmer.org/assets/img/prof_pic.png">

  <!-- Fonts -->
  <style>
    @font-face { font-family: 'Roboto'; font-style: normal; font-weight: 300; src: url('/assets/fonts/roboto-300.ttf') format('truetype'); }
    @font-face { font-family: 'Roboto'; font-style: normal; font-weight: 400; src: url('/assets/fonts/roboto-400.ttf') format('truetype'); }
    @font-face { font-family: 'Roboto'; font-style: normal; font-weight: 500; src: url('/assets/fonts/roboto-500.ttf') format('truetype'); }
    @font-face { font-family: 'Roboto'; font-style: normal; font-weight: 700; src: url('/assets/fonts/roboto-700.ttf') format('truetype'); }
    @font-face { font-family: 'Roboto Slab'; font-style: normal; font-weight: 300; src: url('/assets/fonts/roboto-slab-300.ttf') format('truetype'); }
    @font-face { font-family: 'Roboto Slab'; font-style: normal; font-weight: 400; src: url('/assets/fonts/roboto-slab-400.ttf') format('truetype'); }
    @font-face { font-family: 'Roboto Slab'; font-style: normal; font-weight: 500; src: url('/assets/fonts/roboto-slab-500.ttf') format('truetype'); }
    @font-face { font-family: 'Roboto Slab'; font-style: normal; font-weight: 700; src: url('/assets/fonts/roboto-slab-700.ttf') format('truetype'); }
  </style>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="animations.css">

  <!-- Favicon -->
  <link rel="icon" href="/assets/img/favicon.ico">
</head>
<body>

  <!-- Sections -->
  <section id="hero" class="section section--hero"></section>
  <section id="about" class="section"></section>
  <section id="research" class="section"></section>
  <section id="highlights" class="section"></section>
  <section id="selected-work" class="section"></section>
  <section id="blog" class="section"></section>
  <section id="contact" class="section section--contact"></section>

  <!-- Footer -->
  <footer class="intro-footer" id="footer"></footer>

  <!-- Data -->
  <script src="content.js"></script>

  <!-- Rendering -->
  <script>
    /* ---- Renderers ---- */

    function renderHero() {
      const d = defined.hero;
      document.getElementById('hero').innerHTML = `
        <div class="container">
          <h1 class="hero__name">${d.name}</h1>
          <p class="hero__subtitle">${d.subtitle}</p>
          <p class="hero__tagline">${d.tagline}</p>
          <div class="hero__logos">
            ${d.affiliations.map(a => a.url ? `<a class="hero__logo" href="${a.url}" target="_blank" rel="noopener">${a.abbr}</a>` : `<span class="hero__logo">${a.abbr}</span>`).join('')}
          </div>
          <a class="hero__website" href="https://maxzimmer.org" target="_blank" rel="noopener">maxzimmer.org &rarr;</a>
          <div class="hero__scroll-hint"><i class="fa-solid fa-chevron-down"></i></div>
        </div>`;
    }

    function renderWho() {
      const d = defined.who;
      document.getElementById('about').innerHTML = `
        <div class="container">
          <h2 class="section__heading animate-on-scroll">About</h2>
          <div class="who__layout">
            <div class="who__text">
              <p class="who__bio animate-on-scroll">${d.bio}</p>
              <ul class="role-list">
                ${d.roles.map(r => `
                  <li class="role-list__item animate-on-scroll">
                    <div class="role-list__title">${r.title}</div>
                    <div class="role-list__org">${r.url ? `<a href="${r.url}" target="_blank" rel="noopener">${r.org}</a>` : r.org}</div>
                  </li>`).join('')}
              </ul>
              <div class="who__background">
                <div>
                  <h3 class="who__bg-title">Education</h3>
                  <ul class="who__bg-list">
                    ${d.education.map(e => `
                      <li class="who__bg-item animate-on-scroll">
                        <div class="who__bg-degree">${e.degree}</div>
                        <div class="who__bg-inst">${e.inst} · ${e.year}</div>
                        ${e.detail ? `<div class="who__bg-detail">${e.detail}</div>` : ''}
                      </li>`).join('')}
                  </ul>
                </div>
                <div>
                  <h3 class="who__bg-title">Experience</h3>
                  <ul class="who__bg-list">
                    ${d.experience.map(e => `
                      <li class="who__bg-item animate-on-scroll">
                        <div class="who__bg-role">${e.role}</div>
                        <div class="who__bg-inst">${e.inst} · ${e.year}</div>
                        ${e.detail ? `<div class="who__bg-detail">${e.detail}</div>` : ''}
                      </li>`).join('')}
                  </ul>
                </div>
              </div>
            </div>
            <div class="who__photo-wrap">
              <img class="who__photo animate-on-scroll" src="${d.photo}" alt="${d.photoAlt}">
            </div>
          </div>
        </div>`;
    }

    function renderResearch() {
      const d = defined.research;
      document.getElementById('research').innerHTML = `
        <div class="container">
          <h2 class="section__heading animate-on-scroll">Research</h2>
          <p class="section__tldr animate-on-scroll">My work spans efficient deep learning, AI-driven mathematical discovery, agentic systems, and environmental AI.</p>
          <div class="research-grid">
            ${d.map(r => `
              <a class="research-card animate-on-scroll" href="${r.url}" target="_blank" rel="noopener">
                <div class="research-card__icon"><i class="${r.icon}"></i></div>
                <div class="research-card__name">${r.name}</div>
                <div class="research-card__desc">${r.desc}</div>
              </a>`).join('')}
          </div>
        </div>`;
    }

    function renderHighlights() {
      const d = defined.highlights;
      document.getElementById('highlights').innerHTML = `
        <div class="container">
          <h2 class="section__heading animate-on-scroll">Highlights</h2>
          <ul class="highlights-list">
            ${d.map(h => `
              <li class="highlight-item animate-on-scroll">
                <div class="highlight-item__text">${h.text}</div>
                <div class="highlight-item__detail">${h.detail}</div>
              </li>`).join('')}
          </ul>
        </div>`;
    }

    function renderSelectedWork() {
      const d = defined.selectedWork;
      document.getElementById('selected-work').innerHTML = `
        <div class="container">
          <h2 class="section__heading animate-on-scroll">Selected Work</h2>
          <p class="section__tldr animate-on-scroll">Recent publications across my research areas. <a href="https://maxzimmer.org/publications/" style="color:var(--color-brand)">View all &rarr;</a></p>
          <div class="projects-list">
            ${d.map(p => `
              <div class="project-card animate-on-scroll">
                <img class="project-card__img" src="${p.preview}" alt="${p.title}">
                <div class="project-card__body">
                  <div class="project-card__tag">${p.tag}</div>
                  <div class="project-card__title">${p.title}</div>
                  <div class="project-card__venue">${p.venue}</div>
                  <p class="project-card__desc">${p.desc}</p>
                  <div class="project-card__links">
                    ${p.pdf ? `<a class="project-card__link" href="${p.pdf}" target="_blank" rel="noopener">PDF</a>` : ''}
                    ${p.code ? `<a class="project-card__link" href="${p.code}" target="_blank" rel="noopener">Code</a>` : ''}
                    ${p.blog ? `<a class="project-card__link" href="${p.blog}" target="_blank" rel="noopener">Blog</a>` : ''}
                  </div>
                </div>
              </div>`).join('')}
          </div>
        </div>`;
    }

    function renderBlog() {
      const d = defined.blog;
      document.getElementById('blog').innerHTML = `
        <div class="container">
          <h2 class="section__heading animate-on-scroll">Blog</h2>
          <p class="section__tldr animate-on-scroll">Paper TLDRs in deep learning, mathematics, and more. <a href="https://maxzimmer.org/blog/" style="color:var(--color-brand)">View all &rarr;</a></p>
          <div class="blog-grid">
            ${d.map(b => `
              <a class="blog-item animate-on-scroll" href="${b.url}" target="_blank" rel="noopener">
                <div class="blog-item__tag">${b.tag}</div>
                <div class="blog-item__title">${b.title}</div>
                <div class="blog-item__desc">${b.desc}</div>
                <div class="blog-item__date">${b.date}</div>
              </a>`).join('')}
          </div>
        </div>`;
    }

    function renderContact() {
      const d = defined.contact;
      document.getElementById('contact').innerHTML = `
        <div class="container">
          <h2 class="section__heading animate-on-scroll">${d.heading}</h2>
          <p class="contact__subtext animate-on-scroll">${d.subtext}</p>
          <div class="contact__cta animate-on-scroll">
            ${d.cta.map(c => `<a class="contact__cta-link" href="${c.url}" target="_blank" rel="noopener">${c.label}</a>`).join('')}
          </div>
          <div class="social-row animate-on-scroll">
            ${d.social.map(s => `<a class="social-btn" href="${s.url}" target="_blank" rel="noopener" title="${s.label}"><i class="${s.icon}"></i></a>`).join('')}
          </div>
        </div>`;
    }

    function renderFooter() {
      const d = defined.footer;
      document.getElementById('footer').innerHTML =
        d.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join(' · ');
    }

    /* ---- Scroll Animations ---- */

    function initAnimations() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
    }

    /* ---- Init ---- */

    document.addEventListener('DOMContentLoaded', () => {
      renderHero();
      renderWho();
      renderResearch();
      renderHighlights();
      renderSelectedWork();
      renderBlog();
      renderContact();
      renderFooter();
      initAnimations();
    });
  </script>

</body>
</html>
